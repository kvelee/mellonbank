services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mellon_db
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Password123 # Βάλε έναν δυνατό κωδικό
    networks:
      - mellon-net

  web:
    build:
      context: .
      dockerfile: MellonBank/Dockerfile
    container_name: mellon_app
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=MellonDB;User Id=sa;Password=YourStrong@Password123;TrustServerCertificate=True;Encrypt=False
    depends_on:
      - db
    networks:
      - mellon-net
      
networks:
  mellon-net:
    driver: bridge